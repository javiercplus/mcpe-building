name: Compilar mcpelauncher WAYLAND minimal

on:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
  
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Clonar Manifiesto 
        uses: actions/checkout@v4
        with:
          repository: 'minecraft-linux/mcpelauncher-manifest'
          ref: 'ng'
          submodules: 'recursive'
          
        
      - name: Descargar Dockerfile de construcción
        run: |
          curl -L https://github.com/javiercplus/my-dockers-setup/raw/refs/heads/main/Dockerfile.build -o Dockerfile.build
      
      - name: Construir imagen de entorno
        run: docker build -t mcpelauncher-builder -f Dockerfile.build .

      - name: Compilación con Clang y Optimizaciones
        run: |
          docker run --rm -v ${{ github.workspace }}:/project mcpelauncher-builder /bin/bash -c "
            wget https://huggingface.co/datasets/ccoffee20/trinity-installer/resolve/main/patch.sh &&
            git config --global --add safe.directory /project/libc-shim && git config --global --add safe.directory /project/mcpelauncher-client &&
            bash patch.sh &&
            mkdir -p build && cd build
            CC=clang CXX=clang++ cmake .. \
              -DGAMEWINDOW_SYSTEM=SDL3 \
              -DENABLE_DEV_PATHS=OFF \
              -DJNI_USE_JNIVM=ON \
              -DBUILD_UI=OFF \
              -DBUILD_CLIENT=ON \
              -DBUILD_WEBVIEW=OFF \
              -DUSE_OWN_CURL=OFF \
              -DCMAKE_BUILD_TYPE=Release \
              -DCMAKE_C_FLAGS=-DNDEBUG \
              -DCMAKE_CXX_FLAGS=-DNDEBUG \
              -DCMAKE_POLICY_VERSION_MINIMUM=3.5 
            make -j$(nproc) &&
            #MCPE-EXTRACT
            git clone https://codeberg.org/javiercplus/mcpe-extract.git &&
            cd mcpe-extract
            mkdir -p build && cd build
            cmake .. \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
              -G Ninja \
            -Wno-dev
             ninja
             cd ..
             cd ..
             mkdir upload
             cp  mcpe-extract/build/mcpelauncher-extract upload/
             cp mcpelauncher-client/mcpelauncher-client upload/
             cd upload
             tar -cvf binarios.tar mcpelauncher-extract mcpelauncher-client 
          "
      - name: upload to hf
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -m pip install -U "huggingface_hub[cli]" --break-system-packages
          FILE=build/upload/binarios.tar
          FILE_NAME=$(basename "$FILE")
          hf upload ccoffee20/trinity-installer "$FILE" "$FILE_NAME" --repo-type dataset --token $HF_TOKEN
          
      - name: Subir Binarios
        uses: actions/upload-artifact@v4
        with:
          name: mcpelauncher-ng-debian13
          path: |
            build/upload/binarios.tar
          if-no-files-found: warn
